<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Live Orders | Kash Option - Real-Time Procurement</title>
  
  <meta name="google-site-verification" content="4S5CfgSapiMri3H9hrZAMW-SLzm_N8JxD9vIdPVGL4A" />
  <link rel="icon" type="image/png" href="https://mrkash.net/logo.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root { --accent: #22d3ee; --bg: #050508; --glass: rgba(255, 255, 255, 0.02); }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; text-transform: none !important; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
    }

    /* --- DYNAMIC ISLAND NAVIGATION --- */
    .nav-wrapper { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 95%; max-width: 1100px; }
    .dynamic-island {
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 60px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }
    .island-logo { font-weight: 800; font-size: 0.95rem; padding: 0 15px; color: #fff; text-decoration: none; font-style: italic; }
    .island-logo span { color: var(--accent); }
    .island-nav { display: none; align-items: center; gap: 4px; }
    @media (min-width: 1024px) { .island-nav { display: flex; } }
    .island-nav a { color: #94a3b8; text-decoration: none; font-size: 0.75rem; font-weight: 600; padding: 10px 16px; border-radius: 40px; transition: 0.3s; }
    .island-nav a:hover, .island-nav a.active { color: #fff; background: rgba(255,255,255,0.05); }

    /* --- LIVE FEED UI --- */
    .order-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 16px;
      transition: all 0.5s ease;
      animation: slideIn 0.6s cubic-bezier(0.19, 1, 0.22, 1) forwards;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      box-shadow: 0 0 10px #22c55e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }

    .order-id { font-family: monospace; letter-spacing: 1px; color: var(--accent); }
    .mask-text { color: rgba(255,255,255,0.3); font-size: 0.8rem; }

    /* --- MOBILE OVERLAY --- */
    #mobileMenu {
      position: fixed; inset: 0; background: rgba(5, 5, 8, 0.98); 
      backdrop-filter: blur(20px); z-index: 10000; display: none;
      flex-direction: column; align-items: center; justify-content: center; padding: 2rem;
    }
    #mobileMenu.active { display: flex; }
    #mobileMenu a { font-size: 1.8rem; font-weight: 800; margin: 0.8rem 0; color: #fff; text-decoration: none; font-style: italic; }

    .menu-trigger { 
      width: 36px; height: 36px; border-radius: 50%; background: #fff; color: #000; 
      display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; 
    }
  </style>
</head>
<body>

  <!-- Dynamic Island Navigation -->
  <div class="nav-wrapper">
    <nav class="dynamic-island">
      <a href="index.html" class="island-logo">Kash <span>Option</span></a>
      <div class="island-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="catalog.html">Catalog</a>
        <a href="orders.html" class="active">Live orders</a>
        <a href="testimonials.html">Reviews</a>
        <a href="faqs.html">FAQs</a>
        <a href="contact.html">Contact</a>
        <a href="tracker.html">Tracker</a>
      </div>
      <button class="menu-trigger" onclick="toggleMenu()">
        <i class="fas fa-bars-staggered"></i>
      </button>
    </nav>
  </div>

  <!-- Mobile Menu Overlay -->
  <div id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="catalog.html">Catalog</a>
    <a href="orders.html" style="color: var(--accent);">Live orders</a>
    <a href="tracker.html">Track order</a>
    <a href="contact.html">Contact</a>
    <button onclick="toggleMenu()" class="mt-10 text-gray-500 text-sm font-bold uppercase">Close</button>
  </div>

  <main class="pt-44 pb-32 px-6">
    <!-- Header -->
    <header class="text-center max-w-4xl mx-auto mb-20">
      <h1 class="text-4xl md:text-6xl font-black italic mb-6 leading-[1.1]">
        Live global procurement
      </h1>
      <p class="text-gray-500 font-medium text-lg md:text-xl">
        Real-time updates from our sourcing hubs across Ghana.
      </p>
    </header>

    <!-- Infinite Feed Container -->
    <section id="orderFeed" class="max-w-2xl mx-auto min-h-[600px]">
      <!-- Orders will be injected here by JS -->
    </section>
  </main>

  <footer class="py-20 text-center border-t border-white/5">
    <div class="text-2xl font-black italic mb-8">Kash <span>Option</span></div>
    <div class="flex justify-center gap-10 mb-10 text-[10px] font-bold uppercase tracking-widest text-slate-600">
      <a href="tracker.html" class="hover:text-white">Track shipment</a>
      <a href="policy-terms.html" class="hover:text-white">Service policy</a>
      <a href="faqs.html" class="hover:text-white">Support hub</a>
    </div>
    <p class="text-[9px] text-gray-800 font-bold tracking-[0.5em] uppercase">© 2026 Kash Option • Accra • Ghana</p>
  </footer>

  <script>
    // Config Data
    const categories = ["High-end computing", "Auto engineering", "Luxury apparel", "Professional electronics", "Industrial design", "Wholesale logistics", "Health & Wellness", "Kids & Baby"];
    const cities = ["Accra", "Kumasi", "Takoradi", "Tamale", "Tema", "Cape Coast", "Sekondi", "Obuasi", "Bolgatanga", "Koforidua", "Sunyani", "Ho", "Bawku", "Wa"];
    const container = document.getElementById('orderFeed');
    let generatedIDs = new Set();

    function generateUniqueID() {
      let id;
      do {
        id = 'KO-' + Math.floor(10000 + Math.random() * 90000);
      } while (generatedIDs.has(id));
      generatedIDs.add(id);
      return id;
    }

    function createOrderCard() {
      const id = generateUniqueID();
      const cat = categories[Math.floor(Math.random() * categories.length)];
      const city = cities[Math.floor(Math.random() * cities.length)];
      const mask = `+233******${Math.floor(100 + Math.random() * 899)}`;
      
      const card = document.createElement('div');
      card.className = 'order-card';
      card.innerHTML = `
        <div class="flex justify-between items-start mb-4">
          <span class="order-id font-bold text-sm underline underline-offset-4 decoration-cyan-500/30">${id}</span>
          <div class="flex items-center text-[10px] font-bold text-gray-500 uppercase tracking-widest">
            <span class="live-dot"></span> Live • Just now
          </div>
        </div>
        <div class="text-lg font-bold text-white mb-2">
          ${cat} <span class="text-gray-600 mx-2">→</span> ${city}
        </div>
        <div class="mask-text font-medium">Customer: ${mask}</div>
      `;

      // Prepend to container
      container.insertBefore(card, container.firstChild);

      // Keep DOM lean: Limit to 15-20 items
      if (container.children.length > 15) {
        container.removeChild(container.lastChild);
      }
    }

    // Toggle Mobile Menu
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('active');
    }

    // Initial batch
    for(let i=0; i<5; i++) {
      setTimeout(createOrderCard, i * 300);
    }

    // Infinite Pulse Loop
    setInterval(createOrderCard, 3500);

    // Initial reveal
    document.body.classList.add('reveal-active');
  </script>
</body>
</html>
